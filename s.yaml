edition: 3.0.0
name: yishu-knowledge-fc
access: default

vars:
  region: cn-hangzhou
  service:
    name: yishu-knowledge
    description: 一数知识问答系统（Next.js）

resources:
  web:
    component: fc3
    actions:
      pre-deploy:
        - run: pnpm install --frozen-lockfile
        - run: pnpm build
    props:
      region: ${vars.region}
      service: ${vars.service}
      functionName: web
      description: Next.js 16 Web 应用
      runtime: custom.debian10
      timeout: 300
      cpu: 1
      memorySize: 2048
      diskSize: 512
      internetAccess: true
      instanceConcurrency: 10
      customRuntimeConfig:
        command:
          - pnpm start -- --hostname 0.0.0.0 --port 9000
      environmentVariables:
        NODE_ENV: production
        PORT: "9000"
        HOSTNAME: 0.0.0.0
        VOLC_API_KEY: "请替换为你的密钥"
      code: ./
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
              - HEAD
